name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Lint backend
        run: bun run lint

      - name: Backend smoke test
        run: bun run test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Lint frontend
        run: bun run lint

      - name: Build frontend
        run: bun run build

  deploy_gate:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Resolve production URLs
        env:
          PROD_FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
          PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
        run: |
          FRONTEND_URL="${PROD_FRONTEND_URL:-https://ayushmaurya.xyz}"
          BACKEND_URL="${PROD_BACKEND_URL:-https://api.ayushmaurya.xyz}"
          echo "FRONTEND_URL=$FRONTEND_URL" >> "$GITHUB_ENV"
          echo "BACKEND_URL=$BACKEND_URL" >> "$GITHUB_ENV"

      - name: Check frontend endpoint
        run: curl --fail --silent --show-error "$FRONTEND_URL" > /dev/null

      - name: Check backend health endpoint
        run: curl --fail --silent --show-error "$BACKEND_URL/api/health" > /dev/null

      - name: Check backend readiness endpoint
        run: curl --fail --silent --show-error "$BACKEND_URL/api/ready" > /dev/null
